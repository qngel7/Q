<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hemp.Q — Q.co.kr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #B8960C;
      --green: #3a7d44;
    }

    body {
      background: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid #f0ece4;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 4px;
      text-decoration: none;
    }

    .logo-hemp {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--green);
      font-weight: 400;
    }

    .logo-dot {
      font-size: 12px;
      color: var(--gold);
    }

    .logo-q {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 32px;
      color: var(--gold);
      line-height: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn-download {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid #e8e0d0;
      padding: 6px 14px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-download:hover {
      border-color: var(--gold);
      background: #fffdf7;
    }

    .btn-home {
      font-size: 10px;
      letter-spacing: 2px;
      color: #ccc;
      text-decoration: none;
      transition: color 0.2s;
    }

    .btn-home:hover { color: var(--gold); }

    .pdf-wrap {
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    .pdf-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 모바일: 세로형 PDF 뷰어 */
    @media (max-width: 600px) {
      body { overflow: auto; }
      .pdf-wrap {
        height: calc(100vh - 53px);
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="https://q.co.kr" class="logo">
      <span class="logo-hemp">HEMP</span>
      <span class="logo-dot">.</span>
      <span class="logo-q">Q</span>
    </a>
    <div class="header-right">
      <a href="company.pdf" download class="btn-download">DOWNLOAD</a>
      <a href="https://q.co.kr" class="btn-home">← Q.CO.KR</a>
    </div>
  </header>

  <div class="pdf-wrap">
    <iframe src="company.pdf" type="application/pdf"></iframe>
  </div>

</body>
</html>
