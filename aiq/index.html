<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI.Q — Q.co.kr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #B8960C;
      --orange: #D4681A;
      --gray: #aaa;
      --dark: #1a1a1a;
    }

    body {
      background: #fff;
      color: var(--dark);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 40px 60px;
      text-align: center;
    }

    .logo-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
    }

    .logo-ai {
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--gold);
      font-weight: 500;
      margin-right: 2px;
    }

    .logo-dot {
      font-size: 14px;
      color: var(--gold);
      margin-right: 2px;
    }

    .logo-q {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 88px;
      color: var(--orange);
      line-height: 1;
    }

    .hero-tagline {
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gray);
    }

    /* ── 구분선 ── */
    .divider {
      width: 1px;
      height: 40px;
      background: #e8e0d0;
      margin: 0 0 60px;
    }

    /* ── RANKING LIST ── */
    .ranking-section {
      width: 100%;
      max-width: 800px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sort-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      background: #f0ece4;
      border: 1px solid #e8e0d0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      color: #888;
      transition: all 0.3s;
    }

    .toggle-btn.active {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);
      box-shadow: 0 4px 10px rgba(184, 150, 12, 0.3);
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rank-card {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid #e8e0d0;
      border-radius: 12px;
      padding: 16px 20px;
      text-decoration: none;
      color: var(--dark);
      transition: all 0.3s;
    }

    .rank-card:hover {
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transform: translateY(-2px);
      border-color: var(--gold);
    }

    .rank-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--gold);
      width: 40px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    .rank-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ai-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .ai-version {
      font-size: 11px;
      color: var(--gray);
    }

    .ai-users {
      font-size: 12px;
      font-weight: 500;
      color: var(--orange);
      background: #fff3eb;
      padding: 4px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* ── YouTube ── */
    .yt-section {
      width: 100%;
      max-width: 800px;
      margin: 60px 40px 0;
      padding: 0 40px;
    }

    .yt-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--gray);
      margin-bottom: 8px;
    }

    .yt-title {
      font-size: 13px;
      color: var(--dark);
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .yt-title span {
      color: var(--gold);
    }

    .yt-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #f7f6f4;
    }

    .yt-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 80px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border-top: 1px solid #f0ece4;
      width: 100%;
    }

    .footer-q {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 28px;
      color: var(--gold);
    }

    footer a {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--gold); }

    /* ── 모바일 ── */
    @media (max-width: 600px) {
      .ranking-section { padding: 0 20px; }
      .yt-section { padding: 0 20px; }
      .hero { padding: 60px 20px 40px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-row">
      <span class="logo-ai">AI</span>
      <span class="logo-dot">.</span>
      <span class="logo-q">Q</span>
    </div>
    <p class="hero-tagline">ARTIFICIAL INTELLIGENCE LINKS</p>
  </div>

  <div class="divider"></div>

  <!-- AI 서비스 랭킹 -->
  <div class="ranking-section">
    <div class="sort-toggle">
      <button class="toggle-btn active" id="btn-perf" onclick="setSort('perf')">🏆 성능순</button>
      <button class="toggle-btn" id="btn-user" onclick="setSort('user')">👥 사용자순</button>
    </div>
    <div class="ranking-list" id="aiList">
      <!-- JS Rendered -->
    </div>
  </div>

  <!-- YouTube -->
  <div class="yt-section">
    <p class="yt-label">RECOMMENDED LECTURE</p>
    <p class="yt-title">Intro to Large Language Models — <span>Andrej Karpathy</span></p>
    <div class="yt-wrap">
      <iframe src="https://www.youtube.com/embed/zjkBMFhNj_g" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const aiData = [
      { id: 'claude', name: 'CLAUDE', version: 'Claude 3.5 Sonnet', org: 'Anthropic', url: 'https://claude.ai', users: '약 3천만 명', perfRank: 1, userRank: 4 },
      { id: 'chatgpt', name: 'CHATGPT', version: 'GPT-4o', org: 'OpenAI', url: 'https://chatgpt.com', users: '약 2.5억 명', perfRank: 2, userRank: 1 },
      { id: 'gemini', name: 'GEMINI', version: 'Gemini 1.5 Pro', org: 'Google', url: 'https://gemini.google.com', users: '약 1.5억 명', perfRank: 3, userRank: 3 },
      { id: 'perplexity', name: 'PERPLEXITY', version: 'Pro (Sonar)', org: 'Perplexity AI', url: 'https://www.perplexity.ai', users: '약 1.5천만 명', perfRank: 4, userRank: 5 },
      { id: 'copilot', name: 'COPILOT', version: 'GPT-4 Turbo', org: 'Microsoft', url: 'https://copilot.microsoft.com', users: '약 1.8억 명', perfRank: 5, userRank: 2 }
    ];

    function renderList(sortBy) {
      const listEl = document.getElementById('aiList');
      listEl.innerHTML = '';

      const sortedData = [...aiData].sort((a, b) => {
        if (sortBy === 'perf') return a.perfRank - b.perfRank;
        return a.userRank - b.userRank;
      });

      sortedData.forEach((ai, index) => {
        const card = document.createElement('a');
        card.href = ai.url;
        card.target = '_blank';
        card.className = 'rank-card';
        card.innerHTML = `
          <div class="rank-num">${index + 1}</div>
          <div class="rank-info">
            <div class="ai-name">${ai.name} <span style="color:#aaa; font-size:11px; font-weight:400;">(${ai.org})</span></div>
            <div class="ai-version">${ai.version}</div>
          </div>
          <div class="ai-users">👥 ${ai.users}</div>
        `;
        listEl.appendChild(card);
      });

      document.getElementById('btn-perf').classList.toggle('active', sortBy === 'perf');
      document.getElementById('btn-user').classList.toggle('active', sortBy === 'user');
    }

    // 초기화: 성능순 기본
    renderList('perf');
    window.setSort = renderList;
  </script>

  <footer>
    <span class="footer-q">Q.</span>
    <a href="https://q.co.kr">← Q.CO.KR</a>
  </footer>

</body>
</html>
